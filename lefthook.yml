min_version: 2.1.4

pre-commit:
  commands:
    rustfmt:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy -q -p skills-tools --all-targets -- -D warnings
    skill-frontmatter:
      glob: "**/SKILL.md"
      run: cargo run --quiet -p skills-tools -- validate frontmatter {staged_files}
    gitleaks:
      run: gitleaks protect --staged --no-banner
