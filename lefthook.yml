min_version: 2.1.4

pre-commit:
  commands:
    rust-quality:
      glob: "{Cargo.toml,Cargo.lock,deny.toml,**/*.rs}"
      run: scripts/check-rust.sh
    skill-frontmatter:
      glob: "**/SKILL.md"
      run: cargo run --quiet -p skills-tools -- validate frontmatter {staged_files}
    gitleaks:
      run: gitleaks protect --staged --no-banner
