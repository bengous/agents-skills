# Generated by `itw setup install`. Prefer the setup command so config writes
# are backed up and managed between the intent-to-workflow markers.
#
# Codex resolves relative config_file paths from the config.toml file that
# declares the role.

[agents.itw-worker]
description = "Implementation worker for $intent-to-workflow execution slices. Implements exactly one assigned issue, validates it, and hands off to reviewers before commit."
config_file = "agents/itw-worker.toml"

[agents.itw-simplification-reviewer]
description = "Read-only simplification reviewer for $intent-to-workflow WIP slices. Uses an embedded report-only simplification capability."
config_file = "agents/itw-simplification-reviewer.toml"

[agents.itw-security-reviewer]
description = "Read-only security reviewer for $intent-to-workflow WIP slices. Uses an embedded WIP security-review capability."
config_file = "agents/itw-security-reviewer.toml"

[agents.itw-contract-reviewer]
description = "Read-only contract reviewer for $intent-to-workflow WIP slices. Uses an embedded contract-review capability."
config_file = "agents/itw-contract-reviewer.toml"
