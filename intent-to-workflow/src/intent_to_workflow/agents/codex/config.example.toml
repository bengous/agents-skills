# Append this block to ~/.codex/config.toml after copying this directory's
# itw-*.toml files to ~/.codex/agents/.
#
# Codex resolves relative config_file paths from the config.toml file that
# declares the role.

[agents.itw-worker]
description = "Implementation worker for $intent-to-workflow execution slices. Implements exactly one assigned issue, validates it, and hands off to reviewers before commit."
config_file = "agents/itw-worker.toml"

[agents.itw-simplification-reviewer]
description = "Read-only simplification reviewer for $intent-to-workflow WIP slices. Uses $source-command-simplify-wip when explicitly assigned by the workflow."
config_file = "agents/itw-simplification-reviewer.toml"

[agents.itw-security-reviewer]
description = "Read-only security reviewer for $intent-to-workflow WIP slices. Uses $security-review-wip when explicitly assigned by the workflow."
config_file = "agents/itw-security-reviewer.toml"

[agents.itw-contract-reviewer]
description = "Read-only contract reviewer for $intent-to-workflow WIP slices. Checks implementation against PRD, terminology, current issue, acceptance criteria, and validation."
config_file = "agents/itw-contract-reviewer.toml"
